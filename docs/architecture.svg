<text class="ts ts-teal" x="255" y="100" text-anchor="middle">live network</text>
<text class="ts ts-teal" x="255" y="116" text-anchor="middle">OpenAI</text>
<text class="ts ts-teal" x="255" y="130" text-anchor="middle">Anthropic</text>
<text class="ts ts-teal" x="255" y="144" text-anchor="middle">Google AI</text>
<text class="ts ts-teal" x="255" y="158" text-anchor="middle">vector stores</text>
<text class="ts ts-teal" x="255" y="172" text-anchor="middle">per-process</text>

<!-- L3 -->
<rect x="340" y="58" width="130" height="136" rx="8" class="box-teal" stroke-width="0.5"/>
