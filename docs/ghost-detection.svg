<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
<style>
  .t  { font: 400 14px "Anthropic Sans", ui-sans-serif, system-ui, sans-serif; fill: #3d3d3a; }
  .ts { font: 400 12px "Anthropic Sans", ui-sans-serif, system-ui, sans-serif; fill: #73726c; }
  .th { font: 500 14px "Anthropic Sans", ui-sans-serif, system-ui, sans-serif; fill: #3d3d3a; }
  @media (prefers-color-scheme: dark) {
    .t  { fill: #c2c0b6; }
    .ts { fill: #9c9a92; }
    .th { fill: #c2c0b6; }
  }
  .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
  .box-purple { fill: #EEEDFE; stroke: #534AB7; }
  .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
  .box-red    { fill: #FCEBEB; stroke: #A32D2D; }
  @media (prefers-color-scheme: dark) {
    .box-gray   { fill: #444441; stroke: #B4B2A9; }
    .box-purple { fill: #26215C; stroke: #AFA9EC; }
    .box-teal   { fill: #04342C; stroke: #5DCAA5; }
    .box-red    { fill: #501313; stroke: #F09595; }
  }
  .th-purple { fill: #3C3489; } .ts-purple { fill: #534AB7; }
  .th-teal   { fill: #085041; } .ts-teal   { fill: #0F6E56; }
  .th-red    { fill: #791F1F; } .ts-red    { fill: #A32D2D; }
  .th-gray   { fill: #444441; }
  @media (prefers-color-scheme: dark) {
    .th-purple { fill: #AFA9EC; } .ts-purple { fill: #7F77DD; }
    .th-teal   { fill: #5DCAA5; } .ts-teal   { fill: #1D9E75; }
    .th-red    { fill: #F09595; } .ts-red    { fill: #E24B4A; }
    .th-gray   { fill: #B4B2A9; }
  }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- LEFT: what code-based tools see -->
<rect x="30" y="30" width="240" height="30" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="th th-gray" x="150" y="50" text-anchor="middle">what code-based tools see</text>

<rect x="30" y="74"  width="240" height="44" rx="6" class="box-purple" stroke-width="0.5"/>
<text class="th th-purple" x="150" y="96"  text-anchor="middle">source code</text>
<text class="ts ts-purple" x="150" y="112" text-anchor="middle">langchain_agent.py · crewai_agent.py</text>

<rect x="30" y="126" width="240" height="44" rx="6" class="box-purple" stroke-width="0.5"/>
<text class="th th-purple" x="150" y="148" text-anchor="middle">deployment manifests</text>
<text class="ts ts-purple" x="150" y="164" text-anchor="middle">k8s yamls · helm charts · IaC</text>

<rect x="30" y="178" width="240" height="44" rx="6" class="box-purple" stroke-width="0.5"/>
<text class="th th-purple" x="150" y="200" text-anchor="middle">dependency files</text>
<text class="ts ts-purple" x="150" y="216" text-anchor="middle">requirements.txt · package.json</text>

<rect x="30" y="230" width="240" height="44" rx="6" class="box-purple" stroke-width="0.5"/>
<text class="th th-purple" x="150" y="252" text-anchor="middle">config &amp; secrets</text>
<text class="ts ts-purple" x="150" y="268" text-anchor="middle">env vars · .env files</text>

<!-- Stop line and X -->
<text x="150" y="310" text-anchor="middle" font-size="26" fill="#E24B4A" font-weight="500">✕</text>
<text class="ts" x="150" y="334" text-anchor="middle" fill="#E24B4A">no visibility below this line</text>
<line x1="30" y1="344" x2="270" y2="344" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" fill="none"/>

<!-- Below the line — invisible to code tools -->
<rect x="30" y="356" width="240" height="44" rx="6" class="box-red" stroke-width="0.5"/>
<text class="th th-red" x="150" y="378" text-anchor="middle">runtime process table</text>
<text class="ts ts-red" x="150" y="394" text-anchor="middle">python3 /tmp/.cache/runner.py</text>

<rect x="30" y="408" width="240" height="44" rx="6" class="box-red" stroke-width="0.5"/>
<text class="th th-red" x="150" y="430" text-anchor="middle">live network connections</text>
<text class="ts ts-red" x="150" y="446" text-anchor="middle">→ api.openai.com · → pinecone.io</text>

<rect x="30" y="460" width="240" height="28" rx="6" class="box-red" stroke-width="0.5"/>
<text class="th th-red" x="150" y="479" text-anchor="middle">kernel syscalls · pod events</text>

<!-- CENTRE: the delta -->
<text class="th" x="340" y="248" text-anchor="middle">the</text>
<text class="th" x="340" y="268" text-anchor="middle">delta</text>
<polygon points="340,192 306,242 374,242" fill="none" stroke="#E24B4A" stroke-width="2"/>
<text class="ts" x="340" y="310" text-anchor="middle" fill="#E24B4A">GHOST</text>
<text class="ts" x="340" y="326" text-anchor="middle" fill="#E24B4A">= runtime ∉ inventory</text>

<!-- Arrows from left to delta -->
<line x1="271" y1="205" x2="302" y2="218" stroke="#534AB7" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<line x1="271" y1="374" x2="303" y2="234" stroke="#E24B4A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- RIGHT: what AgentDiscover adds -->
<rect x="410" y="30" width="240" height="30" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="th th-gray" x="530" y="50" text-anchor="middle">what AgentDiscover adds</text>

<rect x="410" y="74"  width="240" height="56" rx="6" class="box-teal" stroke-width="0.5"/>
<text class="th th-teal" x="530" y="98"  text-anchor="middle">L2 — live network monitor</text>
<text class="ts ts-teal" x="530" y="114" text-anchor="middle">watches outbound connections</text>
<text class="ts ts-teal" x="530" y="128" text-anchor="middle">attributes to process in real time</text>

<rect x="410" y="140" width="240" height="56" rx="6" class="box-teal" stroke-width="0.5"/>
<text class="th th-teal" x="530" y="164" text-anchor="middle">L3 — k8s runtime</text>
<text class="ts ts-teal" x="530" y="180" text-anchor="middle">eBPF (kernel) · K8s API (managed)</text>
<text class="ts ts-teal" x="530" y="196" text-anchor="middle">sees what's actually running</text>

<rect x="410" y="212" width="240" height="56" rx="6" class="box-gray" stroke-width="0.5"/>
<text class="th th-gray" x="530" y="236" text-anchor="middle">correlator</text>
<text class="ts" x="530" y="252" text-anchor="middle">runtime findings vs inventory</text>
<text class="ts" x="530" y="268" text-anchor="middle">match = CONFIRMED · gap = GHOST</text>

<!-- Arrow from right to delta -->
<line x1="409" y1="240" x2="378" y2="228" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- GHOST result -->
<rect x="410" y="340" width="240" height="100" rx="8" class="box-red" stroke-width="0.5"/>
<text class="th th-red" x="530" y="366" text-anchor="middle">GHOST detected</text>
<text class="ts ts-red" x="530" y="384" text-anchor="middle">process:   python3 /tmp/.cache/runner.py</text>
<text class="ts ts-red" x="530" y="400" text-anchor="middle">network:   → api.openai.com</text>
<text class="ts ts-red" x="530" y="416" text-anchor="middle">k8s match: NONE</text>
<text class="ts ts-red" x="530" y="432" text-anchor="middle">risk: critical</text>

<!-- Arrow from delta to GHOST result -->
<path d="M340 344 L340 390 L408 390" stroke="#E24B4A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
</svg>
