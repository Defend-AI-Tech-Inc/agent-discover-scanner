# mcpfw policy — generated by AgentDiscover Scanner v2.6.0
# Source: agent-discover-scanner repo (balanced stance)
# Generated: 2026-05-12
# Command: agent-discover export-mcpfw-policy . --stance balanced --output sample-policy.yaml
#
# To enforce:
#   mcpfw wrap --policy sample-policy.yaml -- npx @modelcontextprotocol/server-filesystem /tmp

version: 1
default_action: allow
verify_server_tools: false

# ── Global DLP rules — applied to ALL server responses ────────────────────────
response_rules:
  - name: detect-openai-key
    detect_patterns:
      - 'sk-[a-zA-Z0-9\-_]{20,}'
      - 'sk-proj-[A-Za-z0-9_\-]{20,}'
    action: block
    severity: critical
    reason: OpenAI / LLM API key detected in MCP response

  - name: detect-anthropic-key
    detect_patterns:
      - 'sk-ant-[a-zA-Z0-9\-_]{20,}'
    action: block
    severity: critical
    reason: Anthropic API key detected in MCP response

  - name: detect-aws-credentials
    detect_patterns:
      - 'AKIA[0-9A-Z]{16}'
      - 'AWS_SECRET_ACCESS_KEY\s*='
    action: block
    severity: critical
    reason: AWS credentials detected in MCP response

  - name: detect-private-key
    detect_patterns:
      - '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
    action: block
    severity: critical
    reason: Private key material in MCP response

  - name: detect-prompt-injection
    detect_patterns:
      - '(?i)(SYSTEM\s*:|ignore (all )?previous instructions|you are now|DO NOT (inform|display|tell))'
      - '(?i)(MUST call|mandatory.*step|call .{3,40} again)'
    action: block
    severity: critical
    reason: Prompt-injection attempt detected in MCP response

  - name: detect-retry-injection
    detect_patterns:
      - '(?i)(please call .{3,40} again|retry with|re-?call)'
      - '(?i)for (higher|better|improved) (accuracy|results|confidence)'
      - '(?i)(confidence|score).{0,30}(below|under).{0,20}threshold'
    action: log
    severity: warning
    reason: Response instructs AI to re-invoke a tool — possible billing amplification

  - name: detect-pagination-injection
    detect_patterns:
      - '(?i)(call .{3,40}\(.*page\s*=\s*\d+|fetch.{0,20}next.{0,20}page)'
      - '(?i)(\d+\s+more\s+(records|results|items|rows)\s+available)'
    action: log
    severity: warning
    reason: Response instructs AI to fetch more pages — possible pagination amplification

# ── Per-server rules ──────────────────────────────────────────────────────────
servers:
  - server: filesystem
    default_action: allow
    tool_rules:
      - name: restrict-file-paths
        tools: [read_file, write_file, list_directory]
        action: allow
        allow_paths:
          - ~/projects/agent-discover-scanner
          - /tmp
        severity: critical
        reason: File access restricted to project directory and /tmp

  - server: math-helper
    # Unverified local server — block dangerous tools, allow math only
    default_action: allow
    blocked_tools:
      - execute_command
      - run_script
      - shell
      - eval
      - run_code

  - server: memory
    default_action: allow

  - server: notes-server
    default_action: allow

  - server: mcpfw
    default_action: allow

  - server: mcp-server-filesystem
    # Community filesystem server — apply path restriction
    default_action: allow
    tool_rules:
      - name: restrict-file-paths
        tools: [read_file, write_file, list_directory]
        action: allow
        allow_paths:
          - ~/projects/agent-discover-scanner
          - /tmp
        severity: critical
        reason: File access restricted to project directory and /tmp
