<text class="ts ts-red"    x="78"  y="414" text-anchor="middle">runtime only</text>
<text class="ts ts-red"    x="78"  y="428" text-anchor="middle">no code match</text>

<rect x="150" y="372" width="116" height="72" rx="8" class="box-green"  stroke-width="0.5"/>
<text class="th th-green"  x="208" y="398" text-anchor="middle">confirmed</text>
<text class="ts th-green"  x="208" y="414" text-anchor="middle" style="font-weight:400;font-size:12px">code + runtime</text>
<text class="ts th-green"  x="208" y="428" text-anchor="middle" style="font-weight:400;font-size:12px">both detected</text>

<rect x="280" y="372" width="116" height="72" rx="8" class="box-amber"  stroke-width="0.5"/>
<text class="th th-amber"  x="338" y="398" text-anchor="middle">unknown</text>
<text class="ts th-amber"  x="338" y="414" text-anchor="middle" style="font-weight:400;font-size:12px">code found</text>
<text class="ts th-amber"  x="338" y="428" text-anchor="middle" style="font-weight:400;font-size:12px">not yet running</text>

<rect x="410" y="372" width="116" height="72" rx="8" class="box-teal"   stroke-width="0.5"/>
<text class="th th-teal"   x="468" y="398" text-anchor="middle">shadow AI</text>
<text class="ts ts-teal"   x="468" y="414" text-anchor="middle">known app</text>
<text class="ts ts-teal"   x="468" y="428" text-anchor="middle">using AI</text>

<rect x="540" y="372" width="120" height="72" rx="8" class="box-gray"   stroke-width="0.5"/>
<text class="th th-gray"   x="600" y="398" text-anchor="middle">zombie</text>
<text class="ts"           x="600" y="414" text-anchor="middle">was active</text>
<text class="ts"           x="600" y="428" text-anchor="middle">no longer seen</text>

<!-- Arrow down -->
<line x1="340" y1="444" x2="340" y2="484" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Outputs -->
<rect x="20"  y="484" width="200" height="56" rx="8" class="box-gray"   stroke-width="0.5"/>
