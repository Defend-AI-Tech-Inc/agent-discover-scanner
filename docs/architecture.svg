  .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
  .box-red    { fill: #FCEBEB; stroke: #A32D2D; }
  .box-blue   { fill: #E6F1FB; stroke: #185FA5; }
  @media (prefers-color-scheme: dark) {
    .box-gray   { fill: #444441; stroke: #B4B2A9; }
    .box-purple { fill: #26215C; stroke: #AFA9EC; }
    .box-teal   { fill: #04342C; stroke: #5DCAA5; }
    .box-green  { fill: #173404; stroke: #97C459; }
    .box-amber  { fill: #412402; stroke: #EF9F27; }
    .box-red    { fill: #501313; stroke: #F09595; }
    .box-blue   { fill: #042C53; stroke: #85B7EB; }
    .th-purple  { fill: #AFA9EC; }
    .th-teal    { fill: #5DCAA5; }
    .th-green   { fill: #97C459; }
    .th-amber   { fill: #EF9F27; }
    .th-red     { fill: #F09595; }
    .th-blue    { fill: #85B7EB; }
    .th-gray    { fill: #B4B2A9; }
    .ts-purple  { fill: #7F77DD; }
    .ts-teal    { fill: #1D9E75; }
    .ts-red     { fill: #E24B4A; }
    .ts-blue    { fill: #378ADD; }
  }
  .th-purple { fill: #3C3489; }
  .th-teal   { fill: #085041; }
  .th-green  { fill: #27500A; }
  .th-amber  { fill: #633806; }
  .th-red    { fill: #791F1F; }
  .th-blue   { fill: #0C447C; }
  .th-gray   { fill: #444441; }
  .ts-purple { fill: #534AB7; }
  .ts-teal   { fill: #0F6E56; }
  .ts-red    { fill: #A32D2D; }
  .ts-blue   { fill: #185FA5; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- YOUR ENVIRONMENT container -->
<rect x="20" y="20" width="640" height="190" rx="14" class="box-gray" stroke-width="0.5"/>
