<!-- L1 -->
<rect x="40" y="58" width="130" height="136" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th th-purple" x="105" y="84" text-anchor="middle">layer 1</text>
<text class="ts ts-purple" x="105" y="100" text-anchor="middle">source code</text>
<text class="ts ts-purple" x="105" y="116" text-anchor="middle">LangChain</text>
<text class="ts ts-purple" x="105" y="130" text-anchor="middle">CrewAI</text>
<text class="ts ts-purple" x="105" y="144" text-anchor="middle">AutoGen</text>
<text class="ts ts-purple" x="105" y="158" text-anchor="middle">direct HTTP</text>
<text class="ts ts-purple" x="105" y="172" text-anchor="middle">→ SARIF</text>

