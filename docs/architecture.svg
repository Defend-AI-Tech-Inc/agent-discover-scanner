<text class="ts ts-purple" x="565" y="158" text-anchor="middle">VS Code ext.</text>
<text class="ts ts-purple" x="565" y="172" text-anchor="middle">MCP configs</text>

<!-- Arrows down -->
<line x1="105" y1="194" x2="105" y2="268" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="255" y1="194" x2="255" y2="268" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="405" y1="194" x2="405" y2="268" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="565" y1="194" x2="565" y2="268" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Correlator -->
<rect x="20" y="268" width="640" height="64" rx="10" class="box-gray" stroke-width="0.5"/>
<text class="th th-gray" x="340" y="294" text-anchor="middle">cross-layer correlation engine</text>
<text class="ts" x="340" y="314" text-anchor="middle">runtime identity resolution · SaaS blast radius · GHOST detection</text>

<!-- Arrow down -->
<line x1="340" y1="332" x2="340" y2="372" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Classifications -->
<rect x="20"  y="372" width="116" height="72" rx="8" class="box-red"    stroke-width="0.5"/>
