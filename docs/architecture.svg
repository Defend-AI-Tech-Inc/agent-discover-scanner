<text class="ts ts-teal" x="405" y="100" text-anchor="middle">k8s runtime</text>
<text class="ts ts-teal" x="405" y="116" text-anchor="middle">eBPF / Tetragon</text>
<text class="ts ts-teal" x="405" y="132" text-anchor="middle">↕</text>
<text class="ts ts-teal" x="405" y="148" text-anchor="middle">K8s API monitor</text>
