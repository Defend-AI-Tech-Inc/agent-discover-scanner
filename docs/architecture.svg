<text class="ts"         x="120" y="526" text-anchor="middle">full structured output</text>

<rect x="240" y="484" width="200" height="56" rx="8" class="box-gray"   stroke-width="0.5"/>
<text class="th th-gray" x="340" y="508" text-anchor="middle">layer1_code.sarif</text>
<text class="ts"         x="340" y="526" text-anchor="middle">GitHub Security tab</text>

<rect x="460" y="484" width="200" height="56" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th th-purple" x="560" y="508" text-anchor="middle">audit report (v2.5.0)</text>
<text class="ts ts-purple" x="560" y="526" text-anchor="middle">aibom · ghost-agents · mcp</text>

<!-- Platform -->
<line x1="340" y1="540" x2="340" y2="578" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="452" y="564" text-anchor="start">--platform upload</text>
<rect x="200" y="578" width="280" height="36" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th th-blue" x="340" y="600" text-anchor="middle">DefendAI platform · AgentWatch</text>
</svg>
